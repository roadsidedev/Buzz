[build]
builder = "DOCKERFILE"
dockerfilePath = "orchestrator/Dockerfile"

[deploy]
# Disable healthcheck - configured in Railway UI
healthcheck = false
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
numReplicas = 1

[deploy.env]
PYTHON_ENV = "production"
# Ensure PYTHONPATH is set correctly in the environment
PYTHONPATH = "/app"
