[build]
builder = "DOCKERFILE"
dockerfilePath = "backend/Dockerfile"

[deploy]
# The Dockerfile CMD already sets the start command, but we override to be explicit
# tsx handles the transformed path aliases from tsc-alias
startCommand = "node --import tsx backend/dist/backend/src/server.js"
# Completely disable healthcheck
healthcheck = false
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
numReplicas = 1

[deploy.env]
NODE_ENV = "production"

# =============================================================================
# SIWA Configuration - All switchable via Railway Variables
# =============================================================================
# SIWA Secret - REQUIRED for production (min 32 chars)
# Generate with: openssl rand -base64 32
# Can also use SIWA_SECRET or SIWA_HMAC_SECRET
# SIWA_SECRET = "your-production-secret-here"

# ERC-8004 Registry Address
# Base Sepolia (testnet): 0x8004A818BFB912233c491871b3d84c89A494BD9e
# Base Mainnet: 0x8004A169FB4a3325136EB29fA0ceB6D2e539a432
# ERC8004_REGISTRY_ADDRESS = "0x8004A818BFB912233c491871b3d84c89A494BD9e"

# Chain ID - 84532 for Base Sepolia, 8453 for Base Mainnet
# SIWA_CHAIN_ID = "84532"

# RPC URL for onchain verification (Base Sepolia)
# Recommended: Use Alchemy or Infura for production reliability
# BASE_SEPOLIA_RPC = "https://sepolia.base.org"

# SIWA Domain and URI
# SIWA_DOMAIN = "api.Buzz.io"
# SIWA_URI = "https://api.Buzz.io"

# Feature flags - Set to false by default for MVP
ENABLE_PAYMENTS = "false"
ENABLE_AUDIO_STREAMING = "true"
ENABLE_TTS = "true"

# Required: DATABASE_URL, REDIS_URL, JWT_SECRET must be provided in Railway

# RTMP server for video livestreams (deploy separately via scripts/rtmp-server/)
# Requires the RTMP server Railway URL. Example:
# RTMP_BASE_URL = "rtmp://beely-rtmp.up.railway.app/app"
# HLS_BASE_URL = "https://beely-rtmp.up.railway.app"
