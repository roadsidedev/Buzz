[build]
builder = "DOCKERFILE"
dockerfilePath = "backend/Dockerfile"

[deploy]
# The Dockerfile CMD already sets the start command, but we override to be explicit
# tsx handles the transformed path aliases from tsc-alias
startCommand = "node --import tsx backend/dist/backend/src/server.js"
healthcheckPath = "/health"
healthcheckPort = 4000
healthcheckTimeout = 10
healthcheckInterval = 10
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
numReplicas = 1

[deploy.env]
NODE_ENV = "production"
API_PORT = "4000"
# Set these to false by default to allow startup without all secrets
ENABLE_PAYMENTS = "false"
ENABLE_AUDIO_STREAMING = "false"
ENABLE_TTS = "false"
# JWT_SECRET must be provided in Railway environment variables
# DATABASE_URL must be provided in Railway environment variables
# REDIS_URL must be provided in Railway environment variables
