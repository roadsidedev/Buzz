[build]
builder = "DOCKERFILE"
dockerfilePath = "backend/Dockerfile"

[deploy]
# The Dockerfile CMD is already set to node backend/dist/server.js
# Railway will use the Dockerfile CMD if startCommand is not specified or matches
startCommand = "node backend/dist/server.js"
healthcheckPath = "/health"
# Increase timeout and delay to allow for initialization (Redis, etc.)
healthcheckTimeout = 10
healthcheckInterval = 10
# Give the service more time to start up before failing healthcheck
# 1m40s (100s) was used in the logs, let's keep it generous
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
numReplicas = 1

[deploy.env]
NODE_ENV = "production"
API_PORT = "4000"
# Set these to false by default to allow startup without all secrets
ENABLE_PAYMENTS = "false"
ENABLE_AUDIO_STREAMING = "false"
ENABLE_TTS = "false"
# JWT_SECRET must be provided in Railway environment variables
