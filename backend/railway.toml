[build]
builder = "DOCKERFILE"
dockerfilePath = "backend/Dockerfile"

[deploy]
# The Dockerfile CMD is already set to node backend/dist/server.js
startCommand = "node backend/dist/server.js"
healthcheckPath = "/health"
healthcheckTimeout = 10
healthcheckInterval = 10
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
numReplicas = 1

[deploy.env]
NODE_ENV = "production"
API_PORT = "4000"
# Set these to false by default to allow startup without all secrets
ENABLE_PAYMENTS = "false"
ENABLE_AUDIO_STREAMING = "false"
ENABLE_TTS = "false"
# JWT_SECRET must be provided in Railway environment variables
# DATABASE_URL must be provided in Railway environment variables
# REDIS_URL must be provided in Railway environment variables
