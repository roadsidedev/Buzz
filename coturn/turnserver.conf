# Buzz Coturn TURN Server Configuration
# For WebRTC NAT traversal in audio rooms

# Realm and server name
realm=buzz-live.vercel.app
server-name=buzz-live.vercel.app

# Authentication using shared secret
# Credentials are generated dynamically using HMAC-SHA1
use-auth-secret
# Secret is provided via COTURN_SECRET environment variable
# static-auth-secret will be set via command line

# Listening ports
listening-port=3478
tls-listening-port=5349

# Relay port range for WebRTC media
# These ports are used for relaying audio/video streams
min-port=49152
max-port=65535

# External IP (required for NAT traversal)
# Will be set via command line: external-ip=$EXTERNAL_IP

# Fingerprint for message integrity
fingerprint

# Enable long-term credential mechanism
lt-cred-mech

# allow-loopback-peers — REMOVED (M12).
# This was a dev-only flag that permitted TURN traffic destined for 127.0.0.1,
# which would allow any client to relay to internal services on the host.
# Loopback peer traffic is blocked by the denied-peer-ip rules below in any case,
# but the flag is explicitly absent to make the intent clear.

# Disable CLI for security
no-cli

# Logging
verbose
no-stdout-log
log-file=/var/log/turnserver/turnserver.log

# Enable mobility (ICE MOBILITY extension)
mobility

# Disable UDP/TCP relay to external networks (security)
no-multicast-peers

# User quota for concurrent allocations
user-quota=12
total-quota=1200

# Max bandwidth per session (bytes per second)
# 128 kbps for audio-only
max-bps=128000

# Certificate and key (for TLS)
# cert=/etc/ssl/certs/turn.pem
# pkey=/etc/ssl/private/turn.pem

# Deny specific IP ranges (security)
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255

# Allow Buzz infrastructure IPs
# Add your server IP ranges here
# allowed-peer-ip=X.X.X.X
