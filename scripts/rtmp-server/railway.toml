[build]
builder = "DOCKERFILE"
dockerfilePath = "scripts/rtmp-server/Dockerfile"

[deploy]
startCommand = ""
healthcheck = true
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
numReplicas = 1

# Required for RTMP publish authorization
# Set this to your backend's public URL + the auth endpoint, e.g.:
# https://your-backend.up.railway.app/api/v1/livestreams/auth-publish
# If left unset, falls back to internal service name (only works inside same Railway project)
variables = { BACKEND_PUBLISH_AUTH_URL = "" }

# Port 1935 (RTMP) is exposed automatically via EXPOSE in the Dockerfile
# Port 80 (HLS/HTTP) is exposed automatically via EXPOSE in the Dockerfile
