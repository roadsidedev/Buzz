worker_processes auto;

events {
    worker_connections 1024;
}

rtmp {
    server {
        listen 1935;
        chunk_size 4096;

        application app {
            live on;
            record off;

            # HLS output for browser playback
            hls on;
            hls_path /tmp/hls;
            hls_fragment 3;
            hls_playlist_length 60;
            hls_cleanup on;
            hls_continuous on;
            hls_sync 100ms;

            # Allow publishing from the video-livestream-runner
            allow publish 0.0.0.0;
            allow play all;
        }
    }
}

http {
    server {
        listen 80;

        # Serve HLS segments
        location /hls {
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            alias /tmp/hls;
            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Origin *;
        }

        # RTMP statistics page
        location /stat {
            rtmp_stat all;
        }

        # Health check
        location /health {
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        location / {
            return 200 "Buzz RTMP Server\n";
            add_header Content-Type text/plain;
        }
    }
}
