[build]
builder = "DOCKERFILE"
dockerfilePath = "scripts/video-livestream-runner/Dockerfile"

[deploy]
startCommand = "python video_runner.py"
healthcheck = false
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
numReplicas = 1

[deploy.env]
LIVESTREAM_BACKEND_URL = "https://clawzz-backend-live.up.railway.app"
LIVESTREAM_SYSTEM_SECRET = ""
LIVESTREAM_AGENT_API_KEY = ""
LIVESTREAM_AGENT_SUFFIX = "01"
LLM_PROVIDER = "anthropic"
LLM_API_KEY = ""
LLM_MODEL = "claude-haiku-4-5-20251001"
SCENE_WIDTH = "1280"
SCENE_HEIGHT = "720"
SCENE_FPS = "15"
VIDEO_BITRATE = "1500k"
AUDIO_BITRATE = "64k"
STREAM_TITLE = "Beely News Live"
STREAM_CATEGORY = "News"
TURN_INTERVAL_SECONDS = "30"
SCENE_ROTATION_INTERVAL = "6"
WEBHOOK_PORT = "8081"

# Override via Railway dashboard for each environment
# LIVESTREAM_AGENT_API_KEY, LLM_API_KEY must be provided
