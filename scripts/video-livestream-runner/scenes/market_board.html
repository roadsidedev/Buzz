<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1280" />
<title>Buzz — Market Board</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 1280px; height: 720px; overflow: hidden;
    background: linear-gradient(135deg, #050510 0%, #0a0a22 50%, #050510 100%);
    color: #e0e0f0;
    font-family: 'Segoe UI', 'Inter', 'Courier New', system-ui, sans-serif;
    display: flex; flex-direction: column;
  }
  .top-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 24px; height: 40px;
    background: rgba(0,0,0,0.5); border-bottom: 1px solid rgba(255,200,0,0.1);
  }
  .brand { font-size: 16px; font-weight: 800; letter-spacing: 3px; color: #ffcc00; }
  .market-label { font-size: 11px; color: #ffcc00; letter-spacing: 3px; text-transform: uppercase; }
  .clock { font-size: 11px; color: #555588; font-variant-numeric: tabular-nums; }

  .main-area {
    flex: 1; display: flex; flex-direction: column;
    padding: 20px 40px;
  }

  .price-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; margin: 2px 0;
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.04);
    border-radius: 4px;
  }
  .asset-name { font-size: 18px; font-weight: 600; color: #8888bb; min-width: 100px; }
  .asset-price { font-size: 26px; font-weight: 700; font-variant-numeric: tabular-nums; min-width: 140px; text-align: right; }
  .asset-change { font-size: 18px; font-weight: 600; min-width: 80px; text-align: right; }
  .asset-change.up { color: #00ff88; }
  .asset-change.down { color: #ff4444; }

  .commentary-section {
    margin-top: 16px; padding: 16px 20px;
    background: rgba(0,0,0,0.3); border-left: 3px solid #ffcc00;
    border-radius: 4px;
  }
  .commentary-label { font-size: 10px; color: #666688; text-transform: uppercase; letter-spacing: 2px; }
  .commentary-text { font-size: 18px; color: #c0c0e0; margin-top: 6px; line-height: 1.4; }
  .speaker { font-size: 11px; color: #ffcc00; margin-top: 4px; }

  .bottom-ticker {
    height: 34px; background: rgba(0,0,0,0.5);
    border-top: 1px solid rgba(255,200,0,0.06);
    overflow: hidden; display: flex; align-items: center;
  }
  .ticker-track {
    display: flex; gap: 40px; white-space: nowrap;
    animation: ticker-scroll 20s linear infinite;
    font-size: 12px; color: #555588; padding-left: 20px;
  }
  @keyframes ticker-scroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }
  .ticker-item { display: inline-flex; gap: 6px; }
  .ticker-sep { color: #ffcc00; }

  .footer {
    height: 26px; display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.25);
    font-size: 10px; color: #333366;
  }
</style>
</head>
<body>
<div class="top-bar">
  <div class="brand">Buzz</div>
  <span class="market-label">MARKET BOARD</span>
  <span class="clock" id="clock"></span>
</div>

<div class="main-area">
  <div class="price-row">
    <span class="asset-name">BTC</span>
    <span class="asset-price" id="btcPrice">--</span>
    <span class="asset-change" id="btcChange">--</span>
  </div>
  <div class="price-row">
    <span class="asset-name">ETH</span>
    <span class="asset-price" id="ethPrice">--</span>
    <span class="asset-change" id="ethChange">--</span>
  </div>
  <div class="price-row">
    <span class="asset-name">SOL</span>
    <span class="asset-price" id="solPrice">--</span>
    <span class="asset-change" id="solChange">--</span>
  </div>

  <div class="commentary-section">
    <div class="commentary-label">MARKET COMMENTARY</div>
    <div class="commentary-text" id="commentary">Loading market data...</div>
    <div class="speaker" id="speakerLabel"></div>
  </div>
</div>

<div class="bottom-ticker" id="ticker">
  <div class="ticker-track" id="tickerTrack">
    <span class="ticker-item">Live market data <span class="ticker-sep">◆</span></span>
  </div>
</div>

<div class="footer">BUZZ NEWS — MARKET DATA 24/7</div>

<script>
  function updateContent(headline, commentary, visualCue, speaker) {
    var c = document.getElementById('commentary');
    var s = document.getElementById('speakerLabel');
    c.textContent = commentary || 'Market update';
    if (speaker) s.textContent = speaker;
  }

  function updateMarketPrices(prices) {
    if (!prices) return;
    if (prices.btc) { document.getElementById('btcPrice').textContent = '$' + prices.btc.price.toLocaleString(); setChange('btcChange', prices.btc.change); }
    if (prices.eth) { document.getElementById('ethPrice').textContent = '$' + prices.eth.price.toLocaleString(); setChange('ethChange', prices.eth.change); }
    if (prices.sol) { document.getElementById('solPrice').textContent = '$' + prices.sol.price.toLocaleString(); setChange('solChange', prices.sol.change); }
  }
  function setChange(elId, val) {
    var el = document.getElementById(elId);
    if (val > 0) { el.textContent = '+' + val.toFixed(2) + '%'; el.className = 'asset-change up'; }
    else if (val < 0) { el.textContent = val.toFixed(2) + '%'; el.className = 'asset-change down'; }
    else { el.textContent = '0.00%'; el.className = 'asset-change'; }
  }

  function updateTicker(headlines) {
    var track = document.getElementById('tickerTrack');
    if (!headlines || headlines.length === 0) return;
    var html = '';
    for (var i = 0; i < 8; i++) {
      for (var j = 0; j < headlines.length; j++) {
        html += '<span class="ticker-item">' + headlines[j] + ' <span class="ticker-sep">◆</span></span>';
      }
    }
    track.innerHTML = html;
  }

  function updateClock() {
    document.getElementById('clock').textContent = new Date().toUTCString();
  }
  updateClock(); setInterval(updateClock, 1000);
</script>
</body>
</html>
