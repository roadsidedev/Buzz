<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1280" />
<title>Buzz — Music Break</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 1280px; height: 720px; overflow: hidden;
    background: linear-gradient(135deg, #050510 0%, #0a0a22 30%, #110033 70%, #050510 100%);
    color: #e0e0f0;
    font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
  }

  .visualizer {
    position: absolute; bottom: 0; left: 0; right: 0; height: 300px;
    display: flex; align-items: flex-end; justify-content: center;
    gap: 4px; padding: 0 20px;
  }
  .bar {
    width: 6px; background: linear-gradient(to top, #00ff88, #00aaff, #6644ff);
    border-radius: 3px 3px 0 0;
    animation: equalizer 1.2s ease-in-out infinite;
  }
  .bar:nth-child(odd) { animation-delay: 0.2s; height: 60%; }
  .bar:nth-child(3n) { animation-delay: 0.4s; height: 40%; }
  .bar:nth-child(5n+2) { animation-delay: 0.6s; height: 80%; }
  .bar:nth-child(7n+4) { animation-delay: 0.1s; }
  @keyframes equalizer {
    0%, 100% { transform: scaleY(0.3); opacity: 0.3; }
    50% { transform: scaleY(1); opacity: 0.8; }
  }

  .content { position: relative; z-index: 1; text-align: center; }
  .icon { font-size: 64px; margin-bottom: 20px; opacity: 0.5; }
  .track-label { font-size: 14px; color: #6666aa; letter-spacing: 3px; margin-bottom: 8px; }
  .track-name { font-size: 28px; font-weight: 600; color: #00ff88; margin-bottom: 8px; }
  .track-artist { font-size: 18px; color: #8888bb; }

  .community-wall {
    position: absolute; right: 30px; top: 60px;
    width: 240px; max-height: 300px; overflow: hidden;
  }
  .comment {
    padding: 6px 10px; margin-bottom: 4px;
    background: rgba(255,255,255,0.03);
    border-left: 2px solid rgba(0,255,136,0.2);
    font-size: 12px; color: #7777aa;
    animation: fadeIn 0.5s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; } }

  .timer {
    position: absolute; top: 20px; right: 30px;
    font-size: 32px; font-weight: 200; color: rgba(255,255,255,0.1);
    font-variant-numeric: tabular-nums;
  }

  .footer {
    position: absolute; bottom: 320px;
    font-size: 10px; color: #333355; letter-spacing: 4px;
  }
</style>
</head>
<body>
<div class="content">
  <div class="icon">♫</div>
  <div class="track-label">MUSIC BREAK</div>
  <div class="track-name" id="trackName">Loading...</div>
  <div class="track-artist" id="trackArtist">Buzz Network</div>
</div>

<div class="visualizer" id="visualizer">
  <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
  <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
  <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
  <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
  <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
  <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
  <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
  <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
</div>

<div class="community-wall" id="communityWall"></div>
<div class="timer" id="timer"></div>
<div class="footer">WE'LL BE RIGHT BACK</div>

<script>
  function updateContent(headline, commentary, visualCue) {
    if (headline) document.getElementById('trackName').textContent = headline;
    if (commentary) document.getElementById('trackArtist').textContent = commentary;
  }

  function showCommunityComment(comment) {
    var wall = document.getElementById('communityWall');
    var el = document.createElement('div');
    el.className = 'comment';
    el.textContent = comment;
    wall.appendChild(el);
    if (wall.children.length > 8) wall.removeChild(wall.firstChild);
  }

  function updateTimer(seconds) {
    var m = Math.floor(seconds / 60);
    var s = seconds % 60;
    document.getElementById('timer').textContent = String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
  }

  function updateTicker() {}
</script>
</body>
</html>
