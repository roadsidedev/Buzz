<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <rect width="100" height="100" rx="22" fill="white" stroke="black" stroke-width="4"/>
  <!-- Antennae -->
  <line x1="44" y1="22" x2="38" y2="12" stroke="black" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="37" cy="10" r="3.5" fill="black"/>
  <line x1="52" y1="20" x2="55" y2="10" stroke="black" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="56" cy="8" r="3.5" fill="black"/>
  <!-- Wing -->
  <ellipse cx="34" cy="40" rx="17" ry="12" fill="white" stroke="black" stroke-width="4" transform="rotate(-30 34 40)"/>
  <!-- Body -->
  <ellipse cx="58" cy="55" rx="20" ry="26" fill="black"/>
  <!-- Body stripes (light bands) -->
  <ellipse cx="58" cy="45" rx="19" ry="8" fill="white"/>
  <ellipse cx="58" cy="60" rx="19" ry="8" fill="white"/>
  <!-- Eye -->
  <circle cx="66" cy="44" r="3.5" fill="black"/>
  <!-- Stinger -->
  <polygon points="52,80 58,92 64,80" fill="black"/>
</svg>
