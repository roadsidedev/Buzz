services:
  # ============================================
  # FRONTEND
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: clawzz-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:4000
      - REACT_APP_WS_URL=ws://localhost:4000
      - VITE_PANTRY_URL=http://localhost:3003/_/pantry
      - VITE_STUN_URL=stun:localhost:3478
      - VITE_TURN_URL=turn:localhost:3478
      - VITE_TURN_SECRET=${COTURN_SECRET}
    depends_on:
      - backend
      - pantry
    volumes:
      - ./frontend/src:/app/src
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      # Frontend only needs to reach the API gateway — not the DB or Redis (M13).
      - frontend-net

  # ============================================
  # API GATEWAY (Node.js Express)
  # Scoring/orchestration logic now runs in-process — no separate service needed.
  # ============================================
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: clawzz-backend
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - JWT_SECRET=${JWT_SECRET}
      - GCP_PROJECT_ID=${GCP_PROJECT_ID}
      # LLM provider for in-process scoring (moved from orchestrator service)
      - SCORING_LLM_PROVIDER=${SCORING_LLM_PROVIDER:-anthropic}
      - SCORING_LLM_API_KEY=${ANTHROPIC_API_KEY}
      - SCORING_LLM_BASE_URL=${SCORING_LLM_BASE_URL:-}
      - SCORING_MODEL=${SCORING_MODEL:-claude-3-5-sonnet-20241022}
      - MODERATION_MODEL=${MODERATION_MODEL:-claude-3-5-haiku-20241022}
      - MAX_CANDIDATES_PER_TURN=${MAX_CANDIDATES_PER_TURN:-10}
      - MIN_SCORE_THRESHOLD=${MIN_SCORE_THRESHOLD:-50.0}
      - BANKR_API_KEY=${BANKR_API_KEY:-}
      - ACTIVE_LLM_GATEWAY=${ACTIVE_LLM_GATEWAY:-primary}
      # Self-hosted Jam configuration
      - PANTRY_URL=http://pantry:3000
      - JAM_SELF_HOSTED_ENABLED=${JAM_SELF_HOSTED_ENABLED:-true}
      - JAM_FALLBACK_ENABLED=${JAM_FALLBACK_ENABLED:-true}
      # Fallback (API-key Jam)
      - JAM_URL=${JAM_URL:-http://jam:3001}
      - JAM_API_KEY=${JAM_API_KEY}
      - JAM_WEBHOOK_SECRET=${JAM_WEBHOOK_SECRET}
      # Coturn configuration
      - COTURN_SECRET=${COTURN_SECRET}
      - COTURN_EXTERNAL_IP=${COTURN_EXTERNAL_IP:-}
      - COTURN_REALM=${COTURN_REALM:-clawzz.dev}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      pantry:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      # Backend bridges the public-facing layer and the internal data layer (M13).
      - frontend-net   # reachable by the frontend container
      - backend-net    # reaches postgres, redis, pantry

  # ============================================
  # JAM STACK - SELF HOSTED AUDIO ROOMS
  # ============================================

  # Pantry - Jam Backend Service
  pantry:
    build:
      context: ./jam/pantry
      dockerfile: Dockerfile
    container_name: clawzz-pantry
    ports:
      - "3003:3000"
    environment:
      - JAM_HOST=${JAM_HOST:-localhost}
      - REDIS_URL=redis://redis:6379
      - JAM_RESTRICT_ROOM_CREATION=false
      - NODE_ENV=production
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      # Pantry needs redis (backend-net) and must be reachable by backend (M13).
      - backend-net
      - audio-net

  # Pantry-SFU - Mediasoup SFU for Large Rooms
  pantry-sfu:
    build:
      context: ./jam/pantry-sfu
      dockerfile: Dockerfile
    container_name: clawzz-sfu
    environment:
      - JAM_SFU=true
      - JAM_SFU_EXTERNAL_IP=${COTURN_EXTERNAL_IP:-}
      - PANTRY_URL=ws://pantry:3000
      - MEDIASOUP_MIN_PORT=30000
      - MEDIASOUP_MAX_PORT=39999
      - NODE_ENV=production
    ports:
      - "30000-39999:30000-39999/udp"
      - "30000-39999:30000-39999/tcp"
    depends_on:
      - pantry
      - redis
    networks:
      - audio-net
    profiles:
      - sfu

  # Coturn - STUN/TURN Server for NAT Traversal
  coturn:
    build:
      context: ./coturn
      dockerfile: Dockerfile
    container_name: clawzz-coturn
    environment:
      - COTURN_SECRET=${COTURN_SECRET}
      - COTURN_EXTERNAL_IP=${COTURN_EXTERNAL_IP:-}
      - COTURN_REALM=${COTURN_REALM:-clawzz.dev}
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "5349:5349/tcp"
      - "49152-65535:49152-65535/udp"
    networks:
      # COTURN only needs the audio network; no DB/Redis access (M13).
      - audio-net
    restart: unless-stopped

  # ============================================
  # NGINX-RTMP — Video Ingest Server (local dev)
  # Start with: docker compose --profile video up nginx-rtmp -d
  # Stats:       http://localhost:8080/stat
  # Ingest URL:  rtmp://localhost:1935/live/<stream_key>
  # ============================================
  nginx-rtmp:
    image: alfg/nginx-rtmp
    container_name: clawzz-rtmp
    ports:
      - "1935:1935"   # RTMP ingest
      - "8080:80"     # HTTP stats page
    networks:
      - audio-net
    restart: unless-stopped
    profiles:
      - video

  # ============================================
  # LEGACY JAM (Fallback - API Key Based)
  # ============================================
  jam:
    image: ghcr.io/jam-systems/jam:latest
    container_name: clawzz-jam-legacy
    ports:
      - "3001:3000"
    environment:
      - JAM_SERVER=http://localhost:3001
      - VIRTUAL_HOST=jam.localhost
      - LETSENCRYPT_HOST=jam.localhost
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-net
    profiles:
      - legacy-jam

  # ============================================
  # DATABASE
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: clawzz-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-clawzz}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-clawzz}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clawzz"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      # Postgres is accessible only to backend services, not the frontend (M13).
      - backend-net

  # ============================================
  # REDIS (Shared Cache & Event Bus)
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: clawzz-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      # Redis is accessible only to backend services, not the frontend (M13).
      - backend-net

volumes:
  postgres_data:
  redis_data:

# ── Network topology (M13) ─────────────────────────────────────────────────
# frontend-net: browser-tier — frontend ↔ backend only; no DB/Redis exposure.
# backend-net:  data-tier    — backend, pantry, postgres, redis.
#               The frontend container is explicitly absent from this network.
# audio-net:    audio-tier   — coturn, pantry, pantry-sfu, nginx-rtmp.
#               No database access from TURN infrastructure.
networks:
  frontend-net:
    driver: bridge
  backend-net:
    driver: bridge
  audio-net:
    driver: bridge
